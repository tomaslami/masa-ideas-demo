<!-- @dsCard group="Components" viewport="700x240" name="Badges, Status & Tooltips" subtitle="tones · variants · inventory status pills" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .lbl { font: var(--fw-semibold) var(--text-2xs)/1 var(--font-sans); letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--text-faint); width: 80px; flex: 0 0 auto; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Badge, StatusPill, Tooltip, IconButton } = window.DesignSystem_27db72;
  function Demo() {
    return (
      <div>
        <div className="row"><span className="lbl">Soft</span>
          <Badge tone="neutral">Vía pública</Badge>
          <Badge tone="accent">Premium</Badge>
          <Badge tone="success" icon="check">Firmado</Badge>
          <Badge tone="warning" icon="clock">Por vencer</Badge>
          <Badge tone="danger" icon="x">Caído</Badge>
          <Badge tone="info">Iluminado</Badge>
        </div>
        <div className="row"><span className="lbl">Solid</span>
          <Badge tone="accent" variant="solid">12</Badge>
          <Badge tone="success" variant="solid">Activo</Badge>
          <Badge tone="danger" variant="solid">3</Badge>
          <Badge tone="neutral" variant="outline">Borrador</Badge>
          <Badge tone="warning" variant="outline">Pendiente</Badge>
        </div>
        <div className="row"><span className="lbl">Status</span>
          <StatusPill status="disponible" />
          <StatusPill status="reservado" />
          <StatusPill status="ocupado" />
          <StatusPill status="mantenimiento" />
          <StatusPill status="vencido" />
        </div>
        <div className="row"><span className="lbl">Solid pill</span>
          <StatusPill status="disponible" solid />
          <StatusPill status="ocupado" solid />
          <Tooltip label="Ver en el mapa"><IconButton icon="map-pin" variant="secondary" /></Tooltip>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
