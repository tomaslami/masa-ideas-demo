<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style> body { margin: 0; padding: 20px; background: var(--bg-page); } .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; align-items: start; } .card { background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--radius-md); } </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { EmptyState, Thumbnail } = window.DesignSystem_27db72;
  function Demo() {
    return (
      <div className="grid">
        <div className="card"><EmptyState art="search" title="Sin resultados" description="Probá con otro código o limpiá los filtros." /></div>
        <div className="card"><EmptyState art="board" compact title="Arrastrá una oportunidad acá" /></div>
        <div className="card"><EmptyState art="document" title="Propuesta vacía" description="Elegí carteles del panel para empezar." /></div>
        <div style={{ display: 'flex', gap: 10, gridColumn: '1 / -1' }}>
          <Thumbnail kind="billboard" width={120} label="Foto del cartel" />
          <Thumbnail kind="image" width={120} />
          <Thumbnail kind="map" width={120} />
          <div style={{ flex: 1, alignSelf: 'center', fontSize: 'var(--text-sm)', color: 'var(--text-muted)' }}>Placeholders de foto que se reemplazan al subir la imagen del cartel.</div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
