<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .lbl { font: var(--fw-semibold) var(--text-2xs)/1 var(--font-sans); letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--text-faint); width: 88px; flex: 0 0 auto; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton } = window.DesignSystem_27db72;
  function Demo() {
    return (
      <div>
        <div className="row"><span className="lbl">Variants</span>
          <Button variant="primary" icon="plus">Nuevo cartel</Button>
          <Button variant="secondary">Cancelar</Button>
          <Button variant="ghost" iconRight="chevron-down">Filtros</Button>
          <Button variant="danger" icon="trash-2">Eliminar</Button>
        </div>
        <div className="row"><span className="lbl">Sizes</span>
          <Button size="sm" variant="primary">Small</Button>
          <Button size="md" variant="primary">Medium</Button>
          <Button size="lg" variant="primary">Large</Button>
        </div>
        <div className="row"><span className="lbl">States</span>
          <Button variant="primary" loading>Guardando</Button>
          <Button variant="primary" disabled>Deshabilitado</Button>
          <Button variant="secondary" disabled>Deshabilitado</Button>
        </div>
        <div className="row"><span className="lbl">Icon btns</span>
          <IconButton icon="pencil" title="Editar" />
          <IconButton icon="copy" title="Duplicar" />
          <IconButton icon="map-pin" variant="secondary" title="Ver en mapa" />
          <IconButton icon="star" active title="Destacar" />
          <IconButton icon="trash-2" variant="danger" title="Eliminar" />
          <IconButton icon="plus" variant="primary" title="Agregar" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
