<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; max-width: 640px; }
  .row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; margin-top: 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Select, Textarea, Checkbox, Switch, SegmentedControl } = window.DesignSystem_27db72;
  function Demo() {
    const [view, setView] = React.useState('mapa');
    const [on, setOn] = React.useState(true);
    return (
      <div>
        <div className="grid">
          <Input label="Buscar cartel" icon="search" placeholder="MI-0428, Av. Corrientes…" />
          <Select label="Estado" placeholder="Todos los estados" options={['Disponible','Reservado','Ocupado','Mantenimiento']} />
          <Input label="Precio mensual" prefix="$" suffix="ARS" defaultValue="480.000" />
          <Input label="Email del contacto" error="Ingresá un email válido" defaultValue="juan@" />
        </div>
        <div style={{ maxWidth: 640, marginTop: 18 }}>
          <Textarea label="Notas de la oportunidad" rows={2} placeholder="Detalle del acuerdo, condiciones…" />
        </div>
        <div className="row">
          <SegmentedControl value={view} onChange={setView} options={[{value:'mapa',label:'Mapa',icon:'map'},{value:'lista',label:'Lista',icon:'list'}]} />
          <Checkbox label="Solo disponibles" checked />
          <Checkbox label="Iluminado" />
          <Switch checked={on} onChange={setOn} label="Mostrar vencidos" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
