<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style> body { margin: 0; padding: 24px; background: var(--bg-page); } .row { display:flex; gap:12px; flex-wrap:wrap; } </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Modal, ImportDialog } = window.DesignSystem_27db72;
  function Demo() {
    const [imp, setImp] = React.useState(false);
    const [del, setDel] = React.useState(false);
    return (
      <div className="row">
        <Button variant="secondary" icon="file-up" onClick={() => setImp(true)}>Importar carteles</Button>
        <Button variant="danger" icon="trash-2" onClick={() => setDel(true)}>Eliminar</Button>
        <ImportDialog open={imp} onClose={() => setImp(false)} entity="carteles" rows={16} />
        <Modal open={del} onClose={() => setDel(false)} icon="trash-2" iconTone="neutral"
          title="¿Eliminar el cartel MI-0428?" subtitle="Esta acción no se puede deshacer."
          footer={<><Button variant="secondary" onClick={() => setDel(false)}>Cancelar</Button><Button variant="danger">Eliminar</Button></>}>
          <p style={{ fontSize: 'var(--text-base)', color: 'var(--text-body)' }}>El cartel saldrá del inventario y de toda propuesta activa que lo incluya.</p>
        </Modal>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
