<div id="root" style="height:520px"></div>
<script type="text/babel">
  const { Sidebar } = window.DesignSystem_27db72;
  function Demo() {
    const [active, setActive] = React.useState('inventario');
    return (
      <div style={{ height: 520, display: 'flex' }}>
        <Sidebar

            { section: 'Cuenta' },

            { id: 'config', label: 'Configuración', icon: 'settings' },
          ]}
          user={{ name: 'Lucía Fernández', role: 'Ejecutiva comercial' }}
        />

          Sección activa: <strong style={{ color: 'var(--text-body)', marginLeft: 6 }}>{active}</strong>

  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
