<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .big { font-family: var(--font-display); color: var(--text-heading); font-weight: 500; font-size: 44px; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 6px; }
  .sub { font-family: var(--font-display); color: var(--text-muted); font-weight: 400; font-style: italic; font-size: 20px; margin-bottom: 16px; }
  .meta { font: 11px/1.4 var(--font-mono); color: var(--text-faint); }
</style></head>
<body>
  <div class="big">Vía pública que se ve.</div>
  <div class="sub">Propuesta comercial · Av. del Libertador</div>
  <div class="meta">Spectral · 400 / 500 / 600 · regular &amp; italic — usado en h1–h4 y números destacados de propuesta</div>
</body></html>
