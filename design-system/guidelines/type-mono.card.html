<!-- @dsCard group="Type" viewport="700x180" name="Mono — IBM Plex Mono" subtitle="Códigos, IDs, métricas y cifras tabulares" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  table { border-collapse: collapse; width: 100%; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  th { text-align: left; font: var(--fw-semibold) 10px/1 var(--font-sans); letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--text-faint); padding: 0 0 10px; }
  td { font-size: 14px; color: var(--text-heading); padding: 6px 0; border-top: 1px solid var(--border-subtle); }
  td.r { text-align: right; }
  .id { color: var(--accent-text); }
</style></head>
<body>
  <table>
    <tr><th>Código</th><th>Ubicación</th><th style="text-align:right">Frente</th><th style="text-align:right">Precio / mes</th></tr>
    <tr><td class="id">MI-0428</td><td style="font-family:var(--font-sans)">Av. Corrientes 3200</td><td class="r">8×4 m</td><td class="r">$480.000</td></tr>
    <tr><td class="id">MI-1097</td><td style="font-family:var(--font-sans)">Au. 25 de Mayo km 4</td><td class="r">12×5 m</td><td class="r">$1.250.000</td></tr>
    <tr><td class="id">MI-0533</td><td style="font-family:var(--font-sans)">Av. Cabildo 2100</td><td class="r">6×3 m</td><td class="r">$390.000</td></tr>
  </table>
</body></html>
