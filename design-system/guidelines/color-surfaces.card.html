<!-- @dsCard group="Colors" viewport="700x150" name="Superficies — Crema & Blanco" subtitle="Fondo de página, tarjetas y rellenos cálidos" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 70px; border-radius: var(--radius-md); border: 1px solid var(--border); }
  .sw b { display: block; font: var(--fw-semibold) 12px/1.6 var(--font-sans); color: var(--text-heading); margin-top: 8px; }
  .sw small { font: 11px/1.4 var(--font-mono); color: var(--text-muted); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><b>Card / Blanco</b><small>--surface-card · #FFFFFF</small></div>
    <div class="sw"><div class="chip" style="background:#FBFAF7"></div><b>Página</b><small>--bg-page · #FBFAF7</small></div>
    <div class="sw"><div class="chip" style="background:#F5F2EC"></div><b>Hundido / filas</b><small>--bg-sunken · #F5F2EC</small></div>
    <div class="sw"><div class="chip" style="background:#EDE9E0"></div><b>Hover</b><small>--surface-hover · #EDE9E0</small></div>
  </div>
</body></html>
