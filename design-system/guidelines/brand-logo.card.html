<!-- @dsCard group="Brand" viewport="700x200" name="Logo Masa Ideas" subtitle="Sobre crema y sobre carbón (sidebar)" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); display: flex; gap: 16px; }
  .panel { flex: 1; border-radius: var(--radius-md); border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; height: 150px; }
  .cream { background: var(--bg-page); }
  .dark { background: #1C1B1A; border-color: #34322C; }
  .cap { font: var(--fw-medium) 10px/1 var(--font-mono); letter-spacing: var(--ls-caps); text-transform: uppercase; }
  img { height: 30px; }
  .lockup { display: flex; align-items: center; gap: 10px; }
  .lockup .wm { font-family: var(--font-display); font-weight: 600; font-size: 22px; color: #E9E4DA; letter-spacing: -0.01em; }
</style></head>
<body>
  <div class="panel cream">
    <img src="../assets/logo_masa_ideas.png" alt="Masa Ideas" />
    <span class="cap" style="color:var(--text-faint)">Logo completo sobre crema</span>
  </div>
  <div class="panel dark">
    <div class="lockup">
      <img src="../assets/logo_mark.png" alt="" style="height:34px" />
      <span class="wm">Masa Ideas</span>
    </div>
    <span class="cap" style="color:#A39E92">Marca + wordmark sobre carbón</span>
  </div>
</body></html>
