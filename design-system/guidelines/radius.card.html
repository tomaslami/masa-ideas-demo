<!-- @dsCard group="Spacing" viewport="700x150" name="Radios — apenas redondeado" subtitle="Controles a 3px. Nada de esquinas blandas." -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); display: flex; gap: 20px; align-items: flex-start; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 78px; height: 64px; background: var(--surface-card); border: 1.5px solid var(--border-strong); }
  .col b { font: var(--fw-semibold) 12px/1 var(--font-mono); color: var(--text-heading); }
  .col small { font: 10px/1 var(--font-mono); color: var(--text-faint); }
</style></head>
<body>
  <div class="col"><div class="box" style="border-radius:2px"></div><b>xs</b><small>2px</small></div>
  <div class="col"><div class="box" style="border-radius:3px"></div><b>sm · control</b><small>3px</small></div>
  <div class="col"><div class="box" style="border-radius:4px"></div><b>md · card</b><small>4px</small></div>
  <div class="col"><div class="box" style="border-radius:6px"></div><b>lg · modal</b><small>6px</small></div>
  <div class="col"><div class="box" style="border-radius:999px;width:64px"></div><b>pill</b><small>999px</small></div>
</body></html>
