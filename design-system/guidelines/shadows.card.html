<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px 24px; background: var(--bg-page); display: flex; gap: 26px; align-items: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 96px; height: 60px; background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); }
  .col b { font: var(--fw-semibold) 12px/1 var(--font-mono); color: var(--text-heading); }
  .col small { font: 10px/1 var(--font-mono); color: var(--text-faint); }
</style></head>
<body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><b>xs</b></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><b>sm · card</b></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><b>md · hover</b></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><b>lg · modal</b></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-popover)"></div><b>popover</b></div>
</body></html>
